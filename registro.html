<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" href="img/deportes.png">
    <title>Registro</title>
</head>
<body class="bg-light">
    <div class="container vh-100 d-flex justify-content-center align-items-center">
        <div class="col-12 col-md-5">
    
            <div class="card shadow border-0 p-4">
                <h2 class="text-center fw-bold mb-4">Registrarse</h2>
    
                <form>
                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input type="text" class="form-control" placeholder="Ingresa tu nombre">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Apellido</label>
                        <input type="text" class="form-control" placeholder="Ingresa tu apellido">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Correo</label>
                        <input type="email" class="form-control" placeholder="Ingresa tu correo">
                    </div>
    
                    <div class="mb-3">
                        <label class="form-label">Contraseña</label>
                        <input type="password" class="form-control" placeholder="Ingresa tu contraseña">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Confirmar contraseña</label>
                        <input type="password" class="form-control" placeholder="Confirma tu contraseña">
                    </div>
    
                    <button class="btn btn-warning w-100 fw-bold mb-2">
                        Registrarse
                    </button>
    
                    <a href="login.html" class="btn btn-outline-dark w-100">
                        Ya tengo una cuenta
                    </a>
                    <a href="index.html" class="btn btn-outline-dark w-100 mt-2">
                        Volver a la pagina principal
                    </a>
                </form>
            </div>
    
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
