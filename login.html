<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body class="bg-light">

    <div class="container vh-100 d-flex justify-content-center align-items-center">
        <div class="col-12 col-md-5">
    
            <div class="card shadow border-0 p-4">
                <h2 class="text-center fw-bold mb-4">Iniciar sesión</h2>
    
                <form>
                    <div class="mb-3">
                        <label class="form-label">Correo</label>
                        <input type="email" class="form-control" placeholder="Ingresa tu correo">
                    </div>
    
                    <div class="mb-3">
                        <label class="form-label">Contraseña</label>
                        <input type="password" class="form-control" placeholder="Ingresa tu contraseña">
                    </div>
    
                    <button class="btn btn-warning w-100 fw-bold mb-2">
                        Iniciar sesión
                    </button>
    
                    <a href="index.html" class="btn btn-outline-dark w-100">
                        Volver a la pagina principal
                    </a>
                </form>
            </div>
    
        </div>
    </div>
    
    </body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</html>
